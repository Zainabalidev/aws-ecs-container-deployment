name: Complete App Deployment

on:
  push:
    branches:
      - main 

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::146445314795:role/flask-app-github-actions-role-dev
          aws-region: eu-west-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          REPO_URL="146445314795.dkr.ecr.eu-west-1.amazonaws.com/flask-app-dev"
          docker build -t $REPO_URL:$IMAGE_TAG -t $REPO_URL:latest .
          docker push $REPO_URL:$IMAGE_TAG
          docker push $REPO_URL:latest

      - name: Force ECS Deployment Update
        run: |
          aws ecs update-service \
            --cluster flask-app-cluster-dev \
            --service flask-app-service \
            --force-new-deployment \
            --region eu-west-1